openapi: 3.0.0

info:
  title: Documentation for HedgeNest User 
  version: 1.0.0
  description: HedgeNest for user authentication and management

servers:
  - url: https://localhost:8228/api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    CreateUser:
      type: object
      required:
        - firstName
        - lastName
        - phoneNumber
        - email
        - password
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phoneNumber:
          type: string
        email:
          type: string
          example: johndoe@gmail.com
        password:
          type: string
          example: Password123

    Login:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          example: johndoe@gmail.com
        password:
          type: string
          example: Password123

    VerifyEmail:
      type: object
      required:
        - email
        - otp
      properties:
        email:
          type: string
        otp:
          type: string
          example: "123456"

    ForgotPassword:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          example: johndoe@gmail.com

    ResetPassword:
      type: object
      required:
        - email
        - otp
        - newPassword
        - confirmPassword
      properties:
        email:
          type: string
        otp:
          type: string
          example: "123456"
        newPassword:
          type: string
          example: NewPassword123
        confirmPassword:
          type: string
          example: NewPassword123

    ChangePassword:
      type: object
      required:
        - oldPassword
        - newPassword
        - confirmPassword
      properties:
        oldPassword:
          type: string
          example: Password123
        newPassword:
          type: string
          example: NewPassword456
        confirmPassword:
          type: string
          example: NewPassword456

    CreateTransactionPin:
      type: object
      required:
        - email
        - otp
        - transactionPin
      properties:
        email:
          type: string
          example: johndoe@gmail.com
        otp:
          type: string
          example: "123456"
          description: Six digit OTP sent to the user
        transactionPin:
          type: string
          example: "123456"
          description: Six digit transaction PIN

paths:

  /create-user:
    post:
      tags:
        - Authentication
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUser'
      responses:
        200:
          description: User created successfully
        400:
          description: Validation error
        500:
          description: Server error

  /login:
    post:
      tags:
        - Authentication
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
      responses:
        200:
          description: Login successful
        400:
          description: Invalid credentials
        500:
          description: Server error

  /verify/check:
    post:
      tags:
        - Authentication
      summary: Verify email with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmail'
      responses:
        200:
          description: OTP verified successfully
        400:
          description: Invalid OTP
        404:
          description: User not found
        500:
          description: Server error

  /forgot-password:
    post:
      tags:
        - Authentication
      summary: Send password reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
      responses:
        200:
          description: OTP sent successfully
        400:
          description: User not found
        500:
          description: Server error

  /reset-password:
    post:
      tags:
        - Authentication
      summary: Reset user password with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPassword'
      responses:
        200:
          description: Password reset successful
        400:
          description: Invalid OTP
        404:
          description: User not found
        500:
          description: Server error

  /change-password:
    post:
      tags:
        - Authentication
      summary: Change password for authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePassword'
      responses:
        200:
          description: Password changed successfully
        400:
          description: Invalid credentials
        401:
          description: Unauthorized
        404:
          description: User not found
        500:
          description: Server error

  /create-pin:
    patch:
      tags:
        - email
        - otp
        - transactionPin
        - confirmTransactionPin
      summary: Create transaction PIN for authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionPin'
      responses:
        200:
          description: Transaction PIN created successfully
        400:
          description: Validation error
