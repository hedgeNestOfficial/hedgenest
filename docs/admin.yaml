openapi: 3.0.0
info: 
  title: Documentation for HedgeNest Admin
  version: 1.0.0
  description: HedgeNest for admin management
paths:
  /api/v1/get-One/{id}:
    get:
      summary: Get a single user by ID
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "64f1b2c3d4e5f6a7b8c9d0e1"
      responses:
        "200":
          description: User found successfully
        "404":
          description: User not found

  /api/v1/get-all-users:
    get:
      summary: Get all users
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Found all users

  /api/v1/get-all-payments:
    get:
      summary: Get all payments
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All Payment Gotten Successfully