
openapi: 3.0.0
info: 
  title: Documentation for HedgeNest depositing money into the wallet
  version: 1.0.0
  description: HedgeNest for  depositing money into the wallet
paths: 
  /api/v1/fundWallet:
    post:
      summary: this end point is for initiating payment
      tags: [payment]
      security: 
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
              properties:
                amount: 
                  type: number
                  example: 1500
      responses: 
        "200":
          description: Wallet has been funded successfully
        "400":
          description: something went wrong

  /api/v1/verifyFund:
    get:
      summary: this end point is for verifying payment
      tags: [payment]
      parameters:
        - in: query
          name: reference
          required: true
          schema:
            type: string
          description: Payment reference returned when payment was initialized
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Payment verified successfully
        "400":
          description: something went wrong
           
  /api/v1/withdraw:
    post:
      summary: this end point is for initiating payment
      tags: [payment]
      security: 
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - bankId
              properties:
                amount: 
                  type: number
                  example: 1500
                bankId: 
                  type: string
                  example: 16843f0c4b7a8d5e2f9c12345
      responses: 
        "200":
          description: Withdrawal has been made
        "400":
          description: something went wrong

