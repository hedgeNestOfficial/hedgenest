openapi: 3.0.0
info: 
  title: Documentation for HedgeNest User
  version: 1.0.0
  description: HedgeNest for user authentication and management
paths: 
  /api/v1/preview-plan:
    post:
      summary: this end point is for previewing a savings plan before creating it
      tags: [smartSave]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - targetAmount
                - planType
              properties:
                title:
                  type: string
                  example: "My Savings Plan"
                targetAmount:
                  type: number
                  example: 50000
                planType:
                  type: string
                  example: "FLEXIBLE"
                duration:
                  type: number
                  example: 30
                savingFrequency:
                  type: string
                  example: "DAILY"
                amountPerFrequency:
                  type: number
                  example: 500
      responses:
        "200":
          description: Savings plan preview retrieved successfully
        "400":
          description: Title or target amount is required or invalid duration
        "500":
          description: something went wrong

  /api/v1/create-plan:
    post:
      summary: this end point is for creating a savings plan
      tags: [smartSave]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - targetAmount
                - planType
                - savingFrequency
                - amountPerFrequency
                - transactionPin
              properties:
                title:
                  type: string
                  example: "My Savings Plan"
                targetAmount:
                  type: number
                  example: 50000
                planType:
                  type: string
                  example: "FLEXIBLE"
                duration:
                  type: number
                  example: 30
                savingFrequency:
                  type: string
                  example: "DAILY"
                amountPerFrequency:
                  type: number
                  example: 500
                transactionPin:
                  type: string
                  example: "123456"
      responses:
        "201":
          description: Savings plan created successfully
        "400":
          description: something went wrong

  /api/v1/break-plan/{planId}:
    post:
      summary: this end point is for breaking a savings plan
      tags: [smartSave]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: planId
          required: true
          schema:
            type: string
          example: "64f1b2c3d4e5f6a7b8c9d0e1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - transactionPin
              properties:
                transactionPin:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Plan broken successfully
        "400":
          description: something went wrong

  /api/v1/top-up/{savingId}:
    post:
      summary: this end point is for topping up a flexible savings plan
      tags: [smartSave]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: savingId
          required: true
          schema:
            type: string
          example: "64f1b2c3d4e5f6a7b8c9d0e1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - transactionPin
              properties:
                amount:
                  type: number
                  example: 500
                transactionPin:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Top up successful
        "400":
          description: something went wrong

  /api/v1/get-all-plan:
    get:
      summary: this end point is for getting all savings plans
      tags: [smartSave]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Found all plans successfully
        "500":
          description: something went wrong

  /api/v1/get-one-plan/{id}:
    get:
      summary: this end point is for getting a single savings plan
      tags: [smartSave]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "64f1b2c3d4e5f6a7b8c9d0e1"
      responses:
        "200":
          description: Plan found successfully
        "404":
          description: Plan not found
        "500":
          description: something went wrong
          
  /api/v1/get-user-plan/{userId}/{planId}:
    get:
      summary: Get a specific user with one specific plan
      tags: [smartSave]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
          example: 6a2d9b69914a573e752d7830
        - in: path
          name: planId
          required: true
          schema:
            type: string
          example: 6a348ca7f5446a884ac29067
      responses:
        "200":
          description: User with plan gotten successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User with plan gotten successfully
                  data:
                    type: object
                    properties:
                      firstName:
                        type: string
                        example: John
                      lastName:
                        type: string
                        example: Doe
                      email:
                        type: string
                        example: john@example.com
                      phoneNumber:
                        type: string
                        example: "08012345678"
                  plan:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: 6a348ca7f5446a884ac29067
                      title:
                        type: string
                        example: entertainment
                      targetAmount:
                        type: number
                        example: 80000
                      amountPerFrequency:
                        type: number
                        example: 6500
        "404":
          description: User not found / Plan not found for this user
        "500":
          description: Something went wrong

  /api/v1/get-user-with-all-plan:
    get:
      summary: Get the logged-in user along with all their savings plans
      tags: [smartSave]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User with all plans retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User with all plans retrieved successfully
                  totalPlans:
                    type: number
                    example: 3
                  user:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: 6a2d9b69914a573e752d7830
                      firstName:
                        type: string
                        example: John
                      lastName:
                        type: string
                        example: Doe
                      email:
                        type: string
                        example: john@example.com
                  plans:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          example: 6a348ca7f5446a884ac29067
                        title:
                          type: string
                          example: entertainment
                        amountPerFrequency:
                          type: number
                          example: 6500
        "404":
          description: User not found
        "500":
          description: Something went wrong
          
  /api/v1/get-preview-plan/{planId}:
    get:
      summary: This endpoint is to get the preview of a savings plan by a user
      tags: [smartSave]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: planId
          required: true
          schema:
            type: string
          description: The ID of the savings plan to preview
      responses:
        "200":
          description: Preview plan gotten successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: 6a348ca7f5446a884ac29067
                      title:
                        type: string
                        example: entertainment
                      targetAmount:
                        type: number
                        example: 80000
                      planType:
                        type: string
                        example: LOCKED
                      duration:
                        type: number
                        example: 30
                      savingFrequency:
                        type: string
                        example: DAILY
                      amountPerFrequency:
                        type: number
                        example: 6500
                      interestRate:
                        type: number
                        example: 10
                      canBreak:
                        type: boolean
                        example: true
                      breakingFeePercentage:
                        type: number
                        example: 1.5
                      maturityDate:
                        type: string
                        format: date-time
                        nullable: true
                        example: null
                      createdAt:
                        type: string
                        format: date-time
                        example: "2025-01-15T10:30:00.000Z"
                      updatedAt:
                        type: string
                        format: date-time
                        example: "2025-01-15T10:30:00.000Z"
        "400":
          description: Something went wrong
        "404":
          description: Plan not found or does not belong to this user

