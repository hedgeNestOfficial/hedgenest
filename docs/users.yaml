openapi: 3.0.0
info:
  title: Documentation for HedgeNest User
  version: 1.0.0
  description: HedgeNest for user authentication and management
paths:
  /api/v1/create-user:
    post:
      summary: this end point is to create a user
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - phoneNumber
                - email
                - password
              properties:
                firstName:
                  type: string
                  example: John
                lastName:
                  type: string
                  example: Divine
                phoneNumber:
                  type: string
                  example: 09183748577
                email:
                  type: string
                  example: johndoe@gmail.com
                password:
                  type: string
                  example: Password123
      responses:
        "201":
          description: user successfully created
        "400":
          description: something went wrong

  /api/v1/login:
    post:
      summary: this end point is to login a user
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: johndoe@gmail.com
                password:
                  type: string
                  example: Password123
      responses:
        "201":
          description: login successful
        "400":
          description: something went wrong

  /api/v1/verify/check:
    post:
      summary: this end point is to verify users
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
              properties:
                email:
                  type: string
                  example: johndoe@gmail.com
                otp:
                  type: string
      responses:
        "201":
          description: otp verified successfully
        "400":
          description: something went wrong

  /api/v1/forgot-password:
    post:
      summary: this end point is for forgotten password
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  example: johndoe@gmail.com
      responses:
        "201":
          description: otp verified successfully
        "400":
          description: something went wrong

  /api/v1/reset-password:
    post:
      summary: this end point is for resetting password
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - newPassword
                - confirmPassword
                - otp
              properties:
                email:
                  type: string
                  example: johndoe@gmail.com
                newPassword:
                  type: string
                  example: NewPassword123
                confirmPassword:
                  type: string
                  example: NewPassword123
                otp:
                  type: string
      responses:
        "201":
          description: otp verified successfully
        "400":
          description: something went wrong

  /api/v1/change-password:
    post:
      summary: this end point is for changing password
      tags: [users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newPassword
                - oldPassword
                - confirmPassword
              properties:
                newPassword:
                  type: string
                  example: NewPassword456
                oldPassword:
                  type: string
                  example: Password123
                confirmPassword:
                  type: string
                  example: NewPassword456
      responses:
        "201":
          description: otp verified successfully
        "400":
          description: something went wrong

  /api/v1/create-pin:
    patch:
      summary: this end point is for creating Pin
      tags: [users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - transactionPin
                - confirmTransactionPin
              properties:
                email:
                  type: string
                  example: johndoe@gmail.com
                transactionPin:
                  type: string
                  example: "123456"
                confirmTransactionPin:
                  type: string
                  example: "123456"
      responses:
        "201":
          description: otp verified successfully
        "400":
          description: something went wrong

  /api/v1/update:
    put:
      summary: this end point is for updating user
      tags: [users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - phoneNumber
              properties:
                phoneNumber:
                  type: string
                  example: "09090123456"
                profilePicture:
                  type: string
                  format: binary
      responses:
        "201":
          description: otp verified successfully
        "400":
          description: something went wrong

  /api/v1/resendOtp:
    post:
      summary: this end point is to verify users
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  example: johndoe@gmail.com
      responses:
        "201":
          description: otp verified successfully
        "400":
          description: something went wrong

  /api/v1/changePin:
    put:
      summary: this end point is for changing pin
      tags: [users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldTransactionPin
                - newTransactionPin
                - confirmTransactionPin
              properties:
                oldTransactionPin:
                  type: string
                  example: "123456"
                newTransactionPin:
                  type: string
                  example: "123456"
                confirmTransactionPin:
                  type: string
                  example: "123456"
      responses:
        "201":
          description: otp verified successfully
        "400":
          description: something went wrong

  /api/v1/logout:
    post:
      summary: this end point is to logout a user
      tags: [users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: logged out successfully
        "401":
          description: unauthorized
        "500":
          description: internal server error

  /api/v1/myWallet:
    get:
      summary: this end point is to get a wallet of a user
      tags: [users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My wallet retrieved successfully
        "401":
          description: unauthorized
        "500":
          description: internal server error

  /api/v1/entered-pin/{userId}:
    post:
      summary: This endpoint is used to confirm a user's transaction PIN
      parameters:
        - in: path
          name: userId
      tags: [users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - enteredPin
              properties:
                enteredPin:
                  type: string
                  example: 123456
      responses:
        "201":
          description: Transaction PIN confirmed successfully
        "400":
          description: Invalid transaction PIN

  /api/v1/forgotPin:
    post:
      summary: this end point is for forgotten pin
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  example: johndoe@gmail.com
      responses:
        "201":
          description: otp verified successfully
        "400":
          description: something went wrong

  /api/v1/transaction:
    get:
      summary: this end point is to get all transactions of a user
      tags: [users]
      security:
        - bearerAuth: []
      responses:
        "201":
          description: All my transactions gotten
        "400":
          description: something went wrong

  /api/v1/get-linked-account:
    get:
      summary: Get all linked bank accounts for the logged-in user
      tags: [user]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Linked accounts retrieved successfully
          content:
            application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: Linked accounts retrieved successfully
                totalAccounts:
                  type: number
                  example: 2
                linkedAccounts:
                  type: array
                  items:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: 6a348ca7f5446a884ac29067
                      userId:
                        type: string
                        example: 6a2d9b69914a573e752d7830
                      bankName:
                        type: string
                        example: ACCESS BANK
                      accountName:
                        type: string
                        example: JOHN DOE
                      accountNumber:
                        type: string
                        example: "0123456789"
                      currency:
                        type: string
                        example: NGN
      "404":
        description: No linked accounts found
      "500":
        description: Something went wrong
