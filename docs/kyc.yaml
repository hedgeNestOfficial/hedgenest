
openapi: 3.0.0
info: 
  title: Documentation for HedgeNest KYC
  version: 1.0.0
  description: HedgeNest for KYC
paths: 
  /api/v1/verify:
    post:
      summary: this end point is for verifying KYC for tier 1
      tags: [kyc]
      security: 
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id: 
                  type: string
                  example: "55555555555"
      responses: 
        "200":
          description: KYC uploaded successfully
        "400":
          description: something went wrong
           
  /api/v1/uploadUtilityBill:
    put:
      summary: this end point is for uploading KYC for tier 2
      tags: [kyc]
      security: 
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - utilityBill
              properties:
                utilityBill: 
                  type: string
                  format: binary
      responses: 
        "200":
          description: KYC uploaded successfully
        "400":
          description: something went wrong
